<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audi R8 — ALIAS 3D VIEWER</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #14151a;
    --surface: #1b1c24;
    --border: rgba(255,255,255,0.06);
    --accent: #c4b5a5;
    --accent-dim: rgba(196,181,165,0.4);
    --text: #e3ded7;
    --text-dim: rgba(227,222,215,0.4);
    --mono: 'DM Mono', monospace;
    --sans: 'Syne', sans-serif;
  }
  html, body { width:100%; height:100%; background:var(--bg); color:var(--text); font-family:var(--mono); overflow:hidden; }
  #app { display:flex; flex-direction:column; height:100vh; }
  #topbar {
    display:flex; align-items:center; gap:14px;
    padding:0 20px; height:52px;
    border-bottom:0.5px solid var(--border);
    background:var(--surface);
    flex-shrink:0; z-index:20;
  }
  #logo { font-family:var(--sans); font-size:12px; font-weight:700; letter-spacing:0.2em; color:var(--accent); white-space:nowrap; }
  .div { width:0.5px; height:18px; background:var(--border); flex-shrink:0; }
  #model-name { font-size:11px; color:var(--text-dim); letter-spacing:0.03em; flex:1; }
  
  /* 그룹별 버튼 컨테이너 */
  .control-section { display:flex; gap:5px; align-items:center; background:rgba(0,0,0,0.15); padding:3px; border-radius:6px; border:0.5px solid var(--border); }
  .section-label { font-size:9px; color:var(--text-dim); padding:0 6px; letter-spacing:0.05em; font-weight:500; }
  
  .btn {
    height:26px; padding:0 10px;
    background:transparent; border:none; border-radius:4px;
    color:var(--text-dim); font-family:var(--mono); font-size:10px; letter-spacing:0.05em;
    cursor:pointer; transition:all 0.12s ease; white-space:nowrap;
  }
  .btn:hover { background:rgba(255,255,255,0.04); color:var(--text); }
  .btn.on { background:rgba(196,181,165,0.15); color:var(--accent); font-weight:500; }
  
  #canvas-wrap { position:relative; flex:1; overflow:hidden; }
  #three-canvas { display:block; width:100%; height:100%; cursor:grab; }
  #three-canvas:active { cursor:grabbing; }
  
  #info-overlay {
    position:absolute; bottom:20px; left:20px;
    pointer-events:none; display:flex; flex-direction:column; gap:3px;
    font-size:10px; line-height:1.5; color:rgba(227,222,215,0.3); z-index:10;
  }
  #loading {
    position:absolute; inset:0; background:var(--bg);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; z-index:15;
  }
  #loading.hidden { display:none !important; }
  #load-title { font-family:var(--sans); font-size:15px; font-weight:700; letter-spacing:0.12em; color:var(--text); }
  #load-track { width:180px; height:1.5px; background:rgba(255,255,255,0.06); border-radius:1px; overflow:hidden; }
  #load-fill { height:100%; background:var(--accent); width:0%; transition:width 0.15s; }
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div id="logo">ALIAS 3D VIEWER</div>
    <div class="div"></div>
    <div id="model-name">Audi R8 — Studio Inspection Grid</div>
    
    <div class="control-section">
      <span class="section-label">SHADING</span>
      <button class="btn on" id="sh-studio">STUDIO</button>
      <button class="btn" id="sh-clay">CLAY</button>
      <button class="btn" id="sh-zebra">ZEBRA</button>
    </div>

    <div class="control-section">
      <button class="btn on" id="btn-auto">AUTO ROT</button>
      <button class="btn" id="btn-patch">PATCH LINE</button>
      <button class="btn" id="btn-reset">RESET</button>
    </div>
  </div>
  
  <div id="canvas-wrap">
    <canvas id="three-canvas"></canvas>
    <div id="info-overlay">
      <div>좌클릭 드래그 — 카메라 회전 (TURN)</div>
      <div>우클릭 드래그 / 휠 스크롤 — 확대 및 축소 (ZOOM)</div>
      <div>마우스 휠 클릭 드래그 — 화면 평면 이동 (PANNING)</div>
      <div>상단 오버레이 메뉴 — 실시간 서피스 흐름 검증 매칭 (CLAY / ZEBRA / STUDIO)</div>
    </div>
    <div id="loading">
      <div id="load-title">LOADING ALIAS DATA</div>
      <div id="load-track"><div id="load-fill"></div></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
<script>
(function () {
  let scene, camera, renderer, model, edgeGroup;
  let autoRot = true, showPatch = false, isInteracting = false;
  let currentShaderMode = 'studio'; 

  const canvasEl = document.getElementById('three-canvas');
  const wrap = document.getElementById('canvas-wrap');
  const loadEl = document.getElementById('loading');
  const loadFill = document.getElementById('load-fill');
  
  const shaders = {
    studio: new THREE.MeshStandardMaterial({ color: 0x5c6d80, metalness: 0.7, roughness: 0.18, side: THREE.DoubleSide }),
    clay: new THREE.MeshStandardMaterial({ color: 0x9e948a, metalness: 0.1, roughness: 0.55, side: THREE.DoubleSide })
  };

  // 실시간 수식 매핑 지브라 쉐이더 커스텀 빌드
  shaders.zebra = new THREE.ShaderMaterial({
    side: THREE.DoubleSide,
    vertexShader: `
      varying vec3 vNormal;
      varying vec3 vViewPosition;
      void main() {
        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
        vNormal = normalize(normalMatrix * normal);
        vViewPosition = -mvPosition.xyz;
        gl_Position = projectionMatrix * mvPosition;
      }
    `,
    fragmentShader: `
      varying vec3 vNormal;
      varying vec3 vViewPosition;
      void main() {
        vec3 normal = normalize(vNormal);
        vec3 viewDir = normalize(vViewPosition);
        
        // 시선 방향과 법선 벡터 조합을 이용한 원통형 투영 계산
        float angle = dot(normal, vec3(0.0, 1.0, 0.0)) * 15.0 + normal.x * 10.0;
        float stripe = smoothstep(0.4, 0.6, sin(angle * 2.5) * 0.5 + 0.5);
        
        // 부드러운 안티에일리언 흑백 라인 연산
        vec3 col = mix(vec3(0.08), vec3(0.92), stripe);
        gl_FragColor = vec4(col, 1.0);
      }
    `
  });

  const orb = { theta: 0.5, phi: 1.05, radius: 4.8, target: new THREE.Vector3(0, 0, 0) };

  function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x14151a);
    
    const W = wrap.clientWidth;
    const H = wrap.clientHeight;
    camera = new THREE.PerspectiveCamera(36, W / H, 0.01, 1000);

    renderer = new THREE.WebGLRenderer({ canvas: canvasEl, antialias: true, powerPreference: "high-performance" });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(W, H);
    renderer.outputColorSpace = 'srgb';

    // 정교한 스튜디오 반사판 라이트 구성
    scene.add(new THREE.AmbientLight(0xffffff, 0.4));
    const dl1 = new THREE.DirectionalLight(0xffffff, 1.6);
    dl1.position.set(8, 18, 8);
    scene.add(dl1);
    const dl2 = new THREE.DirectionalLight(0xc2daf2, 0.7);
    dl2.position.set(-8, 6, -8);
    scene.add(dl2);

    updateCamera();
    animate();
    
    window.addEventListener('resize', onResize);
    bindControls();
    setupShaderButtons();
    loadGLB('audi.glb');
  }

  function loadGLB(path) {
    let prog = 0;
    const ticker = setInterval(() => { prog = Math.min(prog + 4, 85); if(loadFill) loadFill.style.width = prog + '%'; }, 60);

    const loader = new THREE.GLTFLoader();
    const dracoLoader = new THREE.DRACOLoader();
    dracoLoader.setDecoderPath('https://www.gstatic.com/draco/v1/decoders/');
    loader.setDRACOLoader(dracoLoader);

    loader.load(path, gltf => {
      clearInterval(ticker);
      if(loadFill) loadFill.style.width = '100%';

      model = gltf.scene;
      
      // 분리된 메쉬들의 불필요한 행렬 갱신을 고정하여 드로우콜 최적화(렉 방지)
      model.matrixWorldAutoUpdate = false;

      applyShaderMode();

      const box = new THREE.Box3().setFromObject(model);
      const ctr = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const maxD = Math.max(size.x, size.y, size.z);
      const sc = 3.6 / maxD;
      
      model.position.sub(ctr).multiplyScalar(sc);
      model.scale.setScalar(sc);
      model.updateMatrixWorld(true);

      buildPatchLines(model);
      
      setTimeout(() => { if(loadEl) loadEl.classList.add('hidden'); }, 150);
    });
  }

  function applyShaderMode() {
    if (!model) return;
    model.traverse(child => {
      if (child.isMesh) {
        child.material = shaders[currentShaderMode];
      }
    });
  }

  function buildPatchLines(root) {
    if (edgeGroup) { scene.remove(edgeGroup); }
    edgeGroup = new THREE.Group();

    root.traverse(child => {
      if (!child.isMesh) return;
      
      // 임계 조절 각도를 16도로 타이트하게 설정해 끊김 제어
      const edges = new THREE.EdgesGeometry(child.geometry, 16); 
      
      // 정면 및 원근 거리에 따른 선 사라짐 방지 특수 깊이 재질 세팅
      const mat = new THREE.LineBasicMaterial({ 
        color: 0x050608,
        transparent: true,
        opacity: 0.85,
        polygonOffset: true,
        polygonOffsetFactor: -1.5, // 메쉬 표면보다 아주 약간 앞으로 끌어내려 매핑함
        polygonOffsetUnits: -1.5
      });
      
      const lines = new THREE.LineSegments(edges, mat);
      lines.matrixAutoUpdate = false;
      lines.matrix.copy(child.matrixWorld);
      
      edgeGroup.add(lines);
    });

    edgeGroup.visible = showPatch;
    scene.add(edgeGroup);
  }

  function setupShaderButtons() {
    const modes = ['studio', 'clay', 'zebra'];
    modes.forEach(mode => {
      document.getElementById(`sh-${mode}`).addEventListener('click', e => {
        modes.forEach(m => document.getElementById(`sh-${m}`).classList.remove('on'));
        e.target.classList.add('on');
        currentShaderMode = mode;
        applyShaderMode();
      });
    });
  }

  function updateCamera() {
    const { theta, phi, radius, target } = orb;
    const sp = Math.sin(phi);
    camera.position.set(
      radius * sp * Math.sin(theta) + target.x,
      radius * Math.cos(phi) + target.y,
      radius * sp * Math.cos(theta) + target.z
    );
    camera.lookAt(target);
  }

  function animate() {
    requestAnimationFrame(animate);
    if (autoRot && model && !isInteracting) {
      model.rotation.y += 0.0012;
      model.updateMatrixWorld(true);
      
      if (edgeGroup && showPatch) {
        let i = 0;
        model.traverse(child => {
          if (child.isMesh && edgeGroup.children[i]) {
            edgeGroup.children[i].matrix.copy(child.matrixWorld);
            i++;
          }
        });
      }
    }
    renderer.render(scene, camera);
  }

  function onResize() {
    const W = wrap.clientWidth; const H = wrap.clientHeight;
    camera.aspect = W / H;
    camera.updateProjectionMatrix();
    renderer.setSize(W, H);
  }

  function bindControls() {
    let mode = 0; let px = 0, py = 0;
    const btnAuto = document.getElementById('btn-auto');
    const btnPatch = document.getElementById('btn-patch');
    const btnReset = document.getElementById('btn-reset');
    
    canvasEl.addEventListener('mousedown', e => {
      e.preventDefault(); isInteracting = true;
      px = e.clientX; py = e.clientY;
      if (e.button === 0) { mode = 1; autoRot = false; if(btnAuto) btnAuto.classList.remove('on'); }
      else if (e.button === 1) { mode = 2; }
      else if (e.button === 2) { mode = 3; }
    });
    
    window.addEventListener('mouseup', () => { mode = 0; isInteracting = false; });
    
    canvasEl.addEventListener('mousemove', e => {
      if (mode === 0) return;
      const dx = e.clientX - px; const dy = e.clientY - py;
      px = e.clientX; py = e.clientY;
      
      if (mode === 1) { 
        orb.theta -= dx * 0.005;
        orb.phi = Math.max(0.05, Math.min(Math.PI - 0.05, orb.phi - dy * 0.005));
      } else if (mode === 2) { 
        const factor = orb.radius * 0.0012;
        const offset = new THREE.Vector3(-dx * factor, dy * factor, 0).applyQuaternion(camera.quaternion);
        orb.target.add(offset);
      } else if (mode === 3) { 
        orb.radius = Math.max(0.8, Math.min(25, orb.radius + dy * 0.012));
      }
      updateCamera();
    });
    
    canvasEl.addEventListener('wheel', e => {
      e.preventDefault();
      orb.radius = Math.max(0.8, Math.min(25, orb.radius + e.deltaY * 0.0025));
      updateCamera();
    }, { passive: false });

    canvasEl.addEventListener('contextmenu', e => e.preventDefault());

    if(btnAuto) btnAuto.addEventListener('click', () => { autoRot = !autoRot; btnAuto.classList.toggle('on', autoRot); });
    if(btnPatch) btnPatch.addEventListener('click', () => { showPatch = !showPatch; btnPatch.classList.toggle('on', showPatch); if (edgeGroup) edgeGroup.visible = showPatch; });
    if(btnReset) btnReset.addEventListener('click', () => {
      orb.radius = 4.8; orb.theta = 0.5; orb.phi = 1.05; orb.target.set(0,0,0);
      if(model) { model.rotation.set(0,0,0); model.updateMatrixWorld(true); }
      updateCamera(); autoRot = true; if(btnAuto) btnAuto.add('on');
    });
  }

  init();
})();
</script>
</body>
</html>
