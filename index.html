<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audi R8 — ALIAS 3D VIEWER</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #16171d; --surface: #1d1e26; --border: rgba(255,255,255,0.07); --accent: #b8a898; --text: #ddd8d0; --text-dim: rgba(221,216,208,0.45); }
  html, body { width:100%; height:100%; background:var(--bg); color:var(--text); font-family: 'DM Mono', monospace; overflow:hidden; }
  #app { display:flex; flex-direction:column; height:100vh; }
  #topbar { display:flex; align-items:center; gap:16px; padding:0 20px; height:48px; border-bottom:0.5px solid var(--border); background:var(--surface); }
  #logo { font-family: 'Syne', sans-serif; font-size:12px; font-weight:700; color:var(--accent); letter-spacing:0.18em; }
  #btn-group { display:flex; gap:6px; margin-left:auto; }
  .btn { height:28px; padding:0 12px; background:transparent; border:0.5px solid rgba(255,255,255,0.1); border-radius:5px; color:var(--text-dim); font-size:10px; cursor:pointer; }
  .btn.on { background:rgba(184,168,152,0.12); border-color:rgba(184,168,152,0.45); color:var(--accent); }
  #canvas-wrap { flex:1; position:relative; }
  #three-canvas { display:block; width:100%; height:100%; }
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div id="logo">ALIAS 3D VIEWER</div>
    <div id="btn-group">
      <button class="btn on" id="btn-auto">AUTO ROT</button>
      <button class="btn" id="btn-reset">RESET</button>
    </div>
  </div>
  <div id="canvas-wrap"><canvas id="three-canvas"></canvas></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
<script>
(function () {
  let scene, camera, renderer, model;
  let autoRot = true;
  const orb = { theta: 0.5, phi: 1.05, radius: 5, target: new THREE.Vector3(0, 0, 0) };

  function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x16171d);
    
    camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('three-canvas'), antialias: true });
    renderer.setPixelRatio(1.2);
    renderer.setSize(window.innerWidth, window.innerHeight);

    scene.add(new THREE.AmbientLight(0xffffff, 0.8));
    const dl = new THREE.DirectionalLight(0xffffff, 1.5);
    dl.position.set(5, 10, 5);
    scene.add(dl);

    loadGLB('audi.glb');
    animate();
    bindEvents();
  }

  function loadGLB(path) {
    const loader = new THREE.GLTFLoader();
    const draco = new THREE.DRACOLoader();
    draco.setDecoderPath('https://www.gstatic.com/draco/v1/decoders/');
    loader.setDRACOLoader(draco);

    loader.load(path, gltf => {
      model = gltf.scene;
      
      // ⚡ 모델 자동 정렬 및 중심점 이동 로직
      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      
      model.position.sub(center); // 모델 중심을 0,0,0으로
      model.scale.setScalar(5 / maxDim); // 화면에 꽉 차게 스케일 조정
      
      scene.add(model);
      updateCamera();
    });
  }

  function updateCamera() {
    const { theta, phi, radius, target } = orb;
    camera.position.set(
      radius * Math.sin(phi) * Math.sin(theta),
      radius * Math.cos(phi),
      radius * Math.sin(phi) * Math.cos(theta)
    );
    camera.lookAt(target);
  }

  function animate() {
    requestAnimationFrame(animate);
    if (autoRot && model) model.rotation.y += 0.002;
    renderer.render(scene, camera);
  }

  function bindEvents() {
    document.getElementById('btn-auto').addEventListener('click', (e) => {
      autoRot = !autoRot;
      e.target.classList.toggle('on', autoRot);
    });

    document.getElementById('btn-reset').addEventListener('click', () => {
      orb.radius = 5; orb.theta = 0.5; orb.phi = 1.05;
      if(model) model.rotation.set(0,0,0);
      updateCamera();
    });

    window.addEventListener('wheel', e => {
      orb.radius = Math.max(0.5, Math.min(50, orb.radius + e.deltaY * 0.005));
      updateCamera();
    });
    
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
  }

  init();
})();
</script>
</body>
</html>
