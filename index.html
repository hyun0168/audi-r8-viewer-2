<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audi R8 — ALIAS 3D VIEWER</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #16171d;
    --surface: #1d1e26;
    --border: rgba(255,255,255,0.07);
    --accent: #b8a898;
    --accent-dim: rgba(184,168,152,0.45);
    --text: #ddd8d0;
    --text-dim: rgba(221,216,208,0.45);
    --mono: 'DM Mono', monospace;
    --sans: 'Syne', sans-serif;
  }
  html, body { width:100%; height:100%; background:var(--bg); color:var(--text); font-family:var(--mono); overflow:hidden; }
  #app { display:flex; flex-direction:column; height:100vh; }
  #topbar {
    display:flex; align-items:center; gap:16px;
    padding:0 20px; height:48px;
    border-bottom:0.5px solid var(--border);
    background:var(--surface);
    flex-shrink:0; z-index:20;
  }
  #logo { font-family:var(--sans); font-size:12px; font-weight:700; letter-spacing:0.18em; color:var(--accent); white-space:nowrap; }
  .div { width:0.5px; height:20px; background:var(--border); flex-shrink:0; }
  #model-name { font-size:11px; color:var(--text-dim); letter-spacing:0.05em; flex:1; }
  #btn-group { display:flex; gap:6px; align-items:center; }
  .btn {
    height:28px; padding:0 12px;
    background:transparent;
    border:0.5px solid rgba(255,255,255,0.1);
    border-radius:5px;
    color:var(--text-dim);
    font-family:var(--mono); font-size:10px; letter-spacing:0.1em;
    cursor:pointer; transition:all 0.15s; white-space:nowrap;
  }
  .btn:hover { background:rgba(255,255,255,0.06); color:var(--text); border-color:rgba(255,255,255,0.18); }
  .btn.on { background:rgba(184,168,152,0.12); border-color:var(--accent-dim); color:var(--accent); }
  
  #canvas-wrap { position:relative; flex:1; overflow:hidden; }
  #three-canvas { display:block; width:100%; height:100%; cursor:grab; }
  #three-canvas:active { cursor:grabbing; }
  
  #info-overlay {
    position:absolute; bottom:20px; left:20px;
    pointer-events:none; display:flex; flex-direction:column; gap:4px;
    font-size:10px; line-height:1.6; color:rgba(221,216,208,0.35); z-index:10;
  }

  #loading {
    position:absolute; inset:0; background:var(--bg);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px; z-index:15;
  }
  #loading.hidden { display:none !important; }
  #load-title { font-family:var(--sans); font-size:16px; font-weight:700; letter-spacing:0.1em; color:var(--text); }
  #load-track { width:200px; height:1.5px; background:rgba(255,255,255,0.07); border-radius:2px; overflow:hidden; }
  #load-fill { height:100%; background:var(--accent); width:0%; transition:width 0.2s; border-radius:2px; }
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div id="logo">ALIAS 3D VIEWER</div>
    <div class="div"></div>
    <div id="model-name">Audi R8 — Surface Boundary Inspection Mode</div>
    <div id="btn-group">
      <button class="btn on" id="btn-auto">AUTO ROT</button>
      <button class="btn" id="btn-patch">PATCH LINE</button>
      <button class="btn" id="btn-reset">RESET</button>
    </div>
  </div>
  <div id="canvas-wrap">
    <canvas id="three-canvas"></canvas>
    <div id="info-overlay">
      <div>좌클릭 드래그 — 카메라 회전 (TURN)</div>
      <div>우클릭 드래그 / 휠 스크롤 — 확대 및 축소 (ZOOM)</div>
      <div>마우스 휠 클릭 드래그 — 화면 평면 이동 (PANNING)</div>
      <div>오른쪽 상단 — 서피스 데이터 검증 메뉴 (INSPECTION OSD)</div>
    </div>
    <div id="loading">
      <div id="load-title">AUDI R8</div>
      <div id="load-track"><div id="load-fill"></div></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
<script>
(function () {
  let scene, camera, renderer, model, edgeGroup;
  let autoRot = true, showPatch = false, isInteracting = false;
  
  const canvasEl = document.getElementById('three-canvas');
  const wrap = document.getElementById('canvas-wrap');
  const loadEl = document.getElementById('loading');
  const loadFill = document.getElementById('load-fill');
  const btnAuto = document.getElementById('btn-auto');
  const btnPatch = document.getElementById('btn-patch');
  const btnReset = document.getElementById('btn-reset');

  const orb = { theta: 0.5, phi: 1.05, radius: 5, target: new THREE.Vector3(0, 0, 0) };

  function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x16171d);
    
    const W = wrap.clientWidth || window.innerWidth;
    const H = wrap.clientHeight || window.innerHeight;
    camera = new THREE.PerspectiveCamera(38, W / H, 0.01, 2000);

    renderer = new THREE.WebGLRenderer({ canvas: canvasEl, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
    renderer.setSize(W, H);
    renderer.outputColorSpace = 'srgb';

    scene.add(new THREE.AmbientLight(0xffffff, 0.45));
    const dl1 = new THREE.DirectionalLight(0xffffff, 1.4);
    dl1.position.set(6, 15, 6);
    scene.add(dl1);
    const dl2 = new THREE.DirectionalLight(0xaec5dd, 0.55);
    dl2.position.set(-6, 4, -6);
    scene.add(dl2);

    updateCamera();
    animate();
    
    window.addEventListener('resize', onResize);
    bindControls();
    loadGLB('audi.glb');
  }

  function loadGLB(path) {
    let prog = 0;
    const ticker = setInterval(() => { prog = Math.min(prog + 5, 90); if(loadFill) loadFill.style.width = prog + '%'; }, 80);

    const loader = new THREE.GLTFLoader();
    const dracoLoader = new THREE.DRACOLoader();
    dracoLoader.setDecoderPath('https://www.gstatic.com/draco/v1/decoders/');
    loader.setDRACOLoader(dracoLoader);

    loader.load(path, gltf => {
      clearInterval(ticker);
      if(loadFill) loadFill.style.width = '100%';

      model = gltf.scene;

      model.traverse(child => {
        if (child.isMesh) {
          child.material = new THREE.MeshStandardMaterial({
            color: 0x415366,
            metalness: 0.65,
            roughness: 0.22,
            side: THREE.DoubleSide
          });
        }
      });

      const box = new THREE.Box3().setFromObject(model);
      const ctr = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const maxD = Math.max(size.x, size.y, size.z);
      const sc = 3.6 / maxD;
      
      model.position.sub(ctr).multiplyScalar(sc);
      model.scale.setScalar(sc);
      scene.add(model);

      // 다중 오브젝트 구조에 최적화된 패치 라인 생성 함수 호출
      buildPatchLines(model);
      
      setTimeout(() => { if(loadEl) loadEl.classList.add('hidden'); }, 200);
    }, xhr => {
      if (xhr.total && loadFill) { prog = Math.round(xhr.loaded / xhr.total * 90); loadFill.style.width = prog + '%'; }
    });
  }

  function buildPatchLines(root) {
    if (edgeGroup) { scene.remove(edgeGroup); }
    edgeGroup = new THREE.Group();

    root.traverse(child => {
      if (!child.isMesh) return;
      
      // 분리된 오브젝트의 경계를 완벽히 추적하기 위해 임계 임계각을 15도로 정밀화
      const edges = new THREE.EdgesGeometry(child.geometry, 15); 
      const mat = new THREE.LineBasicMaterial({ color: 0x07090f });
      const lines = new THREE.LineSegments(edges, mat);
      
      // 개별 오브젝트의 트랜스폼 매트릭스를 그대로 라인 그룹에 바인딩
      lines.matrixAutoUpdate = false;
      lines.matrix.copy(child.matrixWorld);
      
      edgeGroup.add(lines);
    });

    edgeGroup.visible = showPatch;
    scene.add(edgeGroup);
  }

  function updateCamera() {
    const { theta, phi, radius, target } = orb;
    const sp = Math.sin(phi);
    camera.position.set(
      radius * sp * Math.sin(theta) + target.x,
      radius * Math.cos(phi) + target.y,
      radius * sp * Math.cos(theta) + target.z
    );
    camera.lookAt(target);
  }

  function animate() {
    requestAnimationFrame(animate);
    if (autoRot && model && !isInteracting) {
      model.rotation.y += 0.0015;
      // 다중 매트릭스 동기화 방식으로 회전 제어 변환
      if (edgeGroup && showPatch) {
        edgeGroup.children.forEach((line, i) => {
          let mesh = model.children[i];
          if(mesh) line.matrix.copy(mesh.matrixWorld);
        });
      }
    }
    renderer.render(scene, camera);
  }

  function onResize() {
    const W = wrap.clientWidth || window.innerWidth;
    const H = wrap.clientHeight || window.innerHeight;
    camera.aspect = W / H;
    camera.updateProjectionMatrix();
    renderer.setSize(W, H);
  }

  function bindControls() {
    let mode = 0; // 1:회전, 2:패닝, 3:줌
    let px = 0, py = 0;
    
    canvasEl.addEventListener('mousedown', e => {
      e.preventDefault();
      isInteracting = true;
      px = e.clientX; py = e.clientY;
      
      if (e.button === 0) { mode = 1; autoRot = false; if(btnAuto) btnAuto.classList.remove('on'); }
      else if (e.button === 1) { mode = 2; }
      else if (e.button === 2) { mode = 3; }
    });
    
    window.addEventListener('mouseup', () => { mode = 0; isInteracting = false; });
    
    canvasEl.addEventListener('mousemove', e => {
      if (mode === 0) return;
      const dx = e.clientX - px; const dy = e.clientY - py;
      px = e.clientX; py = e.clientY;
      
      if (mode === 1) { 
        orb.theta -= dx * 0.006;
        orb.phi = Math.max(0.05, Math.min(Math.PI - 0.05, orb.phi - dy * 0.006));
      } else if (mode === 2) { 
        const factor = orb.radius * 0.0015;
        const offset = new THREE.Vector3(-dx * factor, dy * factor, 0);
        offset.applyQuaternion(camera.quaternion);
        orb.target.add(offset);
      } else if (mode === 3) { 
        orb.radius = Math.max(1.0, Math.min(30, orb.radius + dy * 0.015));
      }
      updateCamera();
    });
    
    canvasEl.addEventListener('wheel', e => {
      e.preventDefault();
      orb.radius = Math.max(1.0, Math.min(30, orb.radius + e.deltaY * 0.003));
      updateCamera();
    }, { passive: false });

    canvasEl.addEventListener('contextmenu', e => e.preventDefault());
  }

  if(btnAuto) btnAuto.addEventListener('click', () => { autoRot = !autoRot; btnAuto.classList.toggle('on', autoRot); });
  if(btnPatch) btnPatch.addEventListener('click', () => {
    showPatch = !showPatch;
    btnPatch.classList.toggle('on', showPatch);
    if (edgeGroup) edgeGroup.visible = showPatch;
  });
  if(btnReset) btnReset.addEventListener('click', () => {
    orb.radius = 5; orb.theta = 0.5; orb.phi = 1.05; orb.target.set(0,0,0);
    if(model) model.rotation.set(0,0,0);
    updateCamera();
    autoRot = true; if(btnAuto) btnAuto.classList.add('on');
  });

  init();
})();
</script>
</body>
</html>
